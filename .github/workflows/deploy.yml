name: Retrain & Redeploy Lambdas

on:
  workflow_dispatch:
    inputs:
      record_count:
        description: "Number of conversation records exported"
        required: false
        default: "0"
      s3_key:
        description: "S3 key of exported data file"
        required: false
        default: "new_data.json"
      triggered_by:
        description: "What triggered this run"
        required: false
        default: "manual"

env:
  AWS_REGION: us-east-1
  S3_BUCKET:  ${{ secrets.S3_BUCKET }}

jobs:
  deploy:
    name: Simulate Retraining & Redeploy
    runs-on: ubuntu-latest

    steps:

      # ── Setup ────────────────────────────────────────────────────────────────

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Verify AWS connection
        run: |
          echo "Triggered by:      ${{ github.event.inputs.triggered_by }}"
          echo "Records in export: ${{ github.event.inputs.record_count }}"
          aws sts get-caller-identity

      # ── Download new conversation data from S3 ────────────────────────────────

      - name: Download new_data.json from S3
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET }}/${{ github.event.inputs.s3_key }} ./new_data.json
          echo "new_data.json contents:"
          python3 -c "
          import json
          with open('new_data.json') as f:
              d = json.load(f)
          print(f'  Records:     {d[\"record_count\"]}')
          print(f'  Exported at: {d[\"exported_at\"]}')
          "

      # ── Simulate retraining ───────────────────────────────────────────────────

      - name: Simulate retraining on new conversation data
        run: |
          echo "============================================"
          echo "  Simulating model retraining"
          echo "  New conversations: ${{ github.event.inputs.record_count }}"
          echo "  Data file: new_data.json"
          echo "  In production: SageMaker training job"
          echo "  would fine-tune DistilBERT + T5 here"
          echo "============================================"

      # ── Redeploy Lambda 1 (emotion classifier) ───────────────────────────────

      - name: Redeploy Lambda 1 (emotion classifier)
        run: |
          aws lambda update-function-code \
            --function-name lambda1-emotion \
            --image-uri ${{ secrets.ECR_REGISTRY }}/lambda1-emotion:latest \
            --region us-east-1

          aws lambda wait function-updated \
            --function-name lambda1-emotion \
            --region us-east-1

          echo "Lambda 1 redeployed successfully"

      # ── Redeploy Lambda 2 (response generator) ───────────────────────────────

      - name: Redeploy Lambda 2 (response generator)
        run: |
          aws lambda update-function-code \
            --function-name lambda2-response \
            --image-uri ${{ secrets.ECR_REGISTRY }}/lambda2-response:latest \
            --region us-east-1

          aws lambda wait function-updated \
            --function-name lambda2-response \
            --region us-east-1

          echo "Lambda 2 redeployed successfully"

      # ── Verify deployments ────────────────────────────────────────────────────

      - name: Verify Lambda 1 state
        run: |
          aws lambda get-function \
            --function-name lambda1-emotion \
            --region us-east-1 \
            --query "Configuration.{State:State,LastModified:LastModified}"

      - name: Verify Lambda 2 state
        run: |
          aws lambda get-function \
            --function-name lambda2-response \
            --region us-east-1 \
            --query "Configuration.{State:State,LastModified:LastModified}"

      # ── Summary ───────────────────────────────────────────────────────────────

      - name: Deployment summary
        run: |
          echo "============================================"
          echo "  Pipeline complete"
          echo "============================================"
          echo "  Trigger:       ${{ github.event.inputs.triggered_by }}"
          echo "  Records used:  ${{ github.event.inputs.record_count }}"
          echo "  Run number:    ${{ github.run_number }}"
          echo "  Lambda 1:      lambda1-emotion  → redeployed"
          echo "  Lambda 2:      lambda2-response → redeployed"
          echo "============================================"
