name: Deploy Lambdas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Update Lambda 1 with latest ECR image
        run: |
          aws lambda update-function-code \
            --function-name lambda1-emotion \
            --image-uri ${{ secrets.ECR_REGISTRY }}/lambda1-emotion:latest \
            --region us-east-1

      - name: Update Lambda 2 with latest ECR image
        run: |
          aws lambda update-function-code \
            --function-name lambda2-response \
            --image-uri ${{ secrets.ECR_REGISTRY }}/lambda2-response:v3 \
            --region us-east-1

      - name: Verify Lambda 1 update
        run: |
          aws lambda get-function \
            --function-name lambda1-emotion \
            --region us-east-1 \
            --query 'Configuration.LastModified'

      - name: Verify Lambda 2 update
        run: |
          aws lambda get-function \
            --function-name lambda2-response \
            --region us-east-1 \
            --query 'Configuration.LastModified'