name: Deploy Lambdas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Verify AWS Connection
        run: |
          aws sts get-caller-identity

      - name: Check Lambda 1 status
        run: |
          aws lambda get-function \
            --function-name lambda1-emotion \
            --region us-east-1 \
            --query 'Configuration.{State:State,LastModified:LastModified}'

      - name: Check Lambda 2 status
        run: |
          aws lambda get-function \
            --function-name lambda2-response \
            --region us-east-1 \
            --query 'Configuration.{State:State,LastModified:LastModified}'

      - name: Deployment Summary
        run: |
          echo "✅ AWS Connection verified"
          echo "✅ Lambda 1 (emotion classifier) status checked"
          echo "✅ Lambda 2 (response generator) status checked"
          echo "✅ Deployment pipeline completed successfully"