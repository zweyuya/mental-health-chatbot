<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 420px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 600px; }
        .chat-header { background: #4a90d9; color: white; padding: 20px; border-radius: 16px 16px 0 0; text-align: center; }
        .chat-header h2 { margin: 0; font-size: 18px; }
        .chat-header p { margin: 4px 0 0; font-size: 12px; opacity: 0.85; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .message.bot { background: #f0f4f8; color: #333; align-self: flex-start; }
        .message.user { background: #4a90d9; color: white; align-self: flex-end; }
        .emotion-tag { font-size: 11px; opacity: 0.7; margin-top: 4px; }
        .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        .chat-input button { background: #4a90d9; color: white; border: none; padding: 10px 18px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #357abd; }
        .typing { font-size: 13px; color: #999; padding: 0 16px 8px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>🧠 Mental Health Chatbot</h2>
        <p>I'm here to listen and support you</p>
    </div>
    <div class="chat-messages" id="messages">
        <div class="message bot">Hello! I'm here to listen. How are you feeling today?</div>
    </div>
    <div class="typing" id="typing"></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)"/>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const API_URL = "https://vy59ujkxwa.execute-api.us-east-1.amazonaws.com/chat";
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);

    function handleKey(event) {
        if (event.key === "Enter") sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const userText = input.value.trim();
        if (!userText) return;

        appendMessage(userText, "user");
        input.value = "";
        document.getElementById("typing").textContent = "Thinking...";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText, session_id: sessionId })
            });
            const data = await res.json();
            document.getElementById("typing").textContent = "";
            appendMessage(data.response, "bot", data.emotion);
        } catch (err) {
            document.getElementById("typing").textContent = "";
            appendMessage("Sorry, I'm having trouble connecting. Please try again.", "bot");
        }
    }

    function appendMessage(text, sender, emotion) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message " + sender;
        div.textContent = text;
        if (emotion && sender === "bot") {
            const tag = document.createElement("div");
            tag.className = "emotion-tag";
            tag.textContent = "Emotion: " + emotion;
            div.appendChild(tag);
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
